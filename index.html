<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="二维码生成">
    <link rel="manifest" href="manifest.json">
    <title>GB2312 二维码生成器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 { text-align: center; color: #333; font-size: 22px; margin-bottom: 8px; }
        .subtitle { text-align: center; color: #888; font-size: 13px; margin-bottom: 25px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; color: #555; font-size: 14px; margin-bottom: 8px; font-weight: 500; }
        textarea {
            width: 100%;
            height: 100px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            resize: none;
        }
        textarea:focus { outline: none; border-color: #667eea; }
        .generate-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
        }
        .generate-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .result { margin-top: 25px; text-align: center; display: none; }
        .result.show { display: block; }
        .qr-container { background: #f8f9fa; border-radius: 15px; padding: 20px; margin-bottom: 15px; }
        #qrcode { max-width: 100%; height: auto; }
        .tip { color: #888; font-size: 13px; margin-top: 10px; }
        .mode-info { color: #667eea; font-size: 12px; margin-top: 5px; }
        .error { color: #e74c3c; font-size: 14px; padding: 15px; background: #fdf2f2; border-radius: 10px; display: none; margin-top: 15px; }
        .error.show { display: block; }
        .install-prompt { display: none; background: #f0f7ff; border: 1px solid #667eea; border-radius: 10px; padding: 15px; margin-bottom: 20px; text-align: center; }
        .install-prompt button { background: #667eea; color: white; border: none; padding: 10px 20px; border-radius: 8px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 GB2312 二维码</h1>
        <p class="subtitle">支持扫码枪识别中文</p>
        
        <div class="install-prompt" id="installPrompt">
            <p>📲 添加到主屏幕使用</p>
            <button id="installBtn">安装应用</button>
        </div>
        
        <div class="input-group">
            <label for="text">输入内容</label>
            <textarea id="text" placeholder="输入中文、数字或英文..."></textarea>
        </div>
        
        <button class="generate-btn" id="generateBtn">生成二维码</button>
        
        <div class="error" id="error"></div>
        
        <div class="result" id="result">
            <div class="qr-container">
                <img id="qrcode" alt="QR Code">
            </div>
            <p class="tip">💡 长按图片保存</p>
            <p class="mode-info" id="modeInfo"></p>
        </div>
    </div>

    <script>
        let deferredPrompt;
        const installPrompt = document.getElementById('installPrompt');
        
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installPrompt.style.display = 'block';
        });
        
        document.getElementById('installBtn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt = null;
                installPrompt.style.display = 'none';
            }
        });
        
        document.getElementById('generateBtn').addEventListener('click', generateQRCode);
        document.getElementById('text').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                generateQRCode();
            }
        });
        
        async function generateQRCode() {
            const text = document.getElementById('text').value.trim();
            const errorEl = document.getElementById('error');
            const resultEl = document.getElementById('result');
            const btn = document.getElementById('generateBtn');
            
            errorEl.classList.remove('show');
            resultEl.classList.remove('show');
            
            if (!text) {
                errorEl.textContent = '请输入内容';
                errorEl.classList.add('show');
                return;
            }
            
            btn.disabled = true;
            btn.textContent = '生成中...';
            
            try {
                const response = await fetch('/api/qrcode?text=' + encodeURIComponent(text));
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('qrcode').src = data.dataURL;
                    document.getElementById('modeInfo').textContent = 
                        data.mode === 'hanzi' 
                            ? '编码: Hanzi (纯汉字，扫码枪可识别)' 
                            : '编码: UTF-8 (混合内容)';
                    resultEl.classList.add('show');
                } else {
                    errorEl.textContent = '生成失败: ' + data.error;
                    errorEl.classList.add('show');
                }
            } catch (err) {
                errorEl.textContent = '网络错误: ' + err.message;
                errorEl.classList.add('show');
            } finally {
                btn.disabled = false;
                btn.textContent = '生成二维码';
            }
        }
        
        document.getElementById('text').focus();
    </script>
</body>
</html>
